<section class="section cta-section" style="background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%); color:#fff; border-radius: 20px; margin: 0 1rem;" data-animate>
  <div class="container" style="text-align:center;">
    <h2 style="color:#fff;">{{ site.data.settings.cta_section.title }}</h2>
    <p style="color:rgba(255,255,255,0.9); max-width:560px; margin:0 auto 1.5rem;">{{ site.data.settings.cta_section.text }}</p>
    <a href="{{ site.data.settings.cta_section.button_url | relative_url }}" class="btn btn-outline-light">{{ site.data.settings.cta_section.button_text }}</a>
  </div>
</section>
