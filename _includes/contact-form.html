{% comment %}
  Formulario de contacto (estático). Usa Formspree/GetForm/GoogleForms u otro
  backend "serverless" — reemplaza el atributo action por el endpoint elegido,
  ya que Jekyll/GitHub Pages no procesa formularios en servidor.
{% endcomment %}
<form class="contact-form" action="https://formspree.io/f/TU_FORM_ID" method="POST">
  <div class="form-row">
    <div class="form-group">
      <label for="name">Nombre completo <span class="required">*</span></label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label for="email">Correo electrónico <span class="required">*</span></label>
      <input type="email" id="email" name="email" required>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="phone">Teléfono</label>
      <input type="tel" id="phone" name="phone">
    </div>
    <div class="form-group">
      <label for="service">Servicio de interés</label>
      <select id="service" name="service">
        {% for s in site.services %}
          <option value="{{ s.title }}">{{ s.title }}</option>
        {% endfor %}
        <option value="Otro">Otro</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label for="message">Mensaje <span class="required">*</span></label>
    <textarea id="message" name="message" required placeholder="Cuéntanos sobre tu proyecto o consulta..."></textarea>
  </div>
  <button type="submit" class="btn btn-primary btn-block">Enviar mensaje</button>
</form>
