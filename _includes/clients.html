<section class="section" style="padding-top:0;">
  <div class="container">
    <p class="text-muted" style="text-align:center; text-transform:uppercase; letter-spacing:0.08em; font-size:0.8rem; margin-bottom:2rem;">Empresas e instituciones que confían en nosotros</p>
    <div class="grid cols-4" style="align-items:center;">
      {% for c in site.data.clients %}
        <img src="{{ c.logo | relative_url }}" alt="{{ c.name }}" loading="lazy" style="filter:grayscale(1); opacity:0.7; max-height:48px; margin:0 auto;">
      {% endfor %}
    </div>
  </div>
</section>
