{% assign post = include.item %}
<article class="card" data-animate>
  <div class="card-image" style="background-image:url('{{ post.image | default: '/assets/images/blog/default.jpg' | relative_url }}');"></div>
  <div class="card-body">
    <span class="card-meta">{{ post.date | date: "%d %b %Y" }} · {{ post.categories | first }}</span>
    <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
    <p class="card-excerpt">{{ post.excerpt | strip_html | truncatewords: 20 }}</p>
    <a href="{{ post.url | relative_url }}" class="card-link">Leer artículo →</a>
  </div>
</article>
