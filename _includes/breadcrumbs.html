{% comment %}
  Uso: {% include breadcrumbs.html trail="Servicios|/servicios/" current=page.title %}
{% endcomment %}
<nav class="breadcrumbs" aria-label="Ruta de navegación">
  <a href="{{ '/' | relative_url }}">Inicio</a>
  {% if include.trail %}
    {% assign parts = include.trail | split: "|" %}
    <span class="sep">/</span>
    <a href="{{ parts[1] | relative_url }}">{{ parts[0] }}</a>
  {% endif %}
  {% if include.current %}
    <span class="sep">/</span>
    <span aria-current="page">{{ include.current }}</span>
  {% endif %}
</nav>
