<a class="skip-link" href="#main-content">Saltar al contenido principal</a>

<header class="navbar">
  <div class="container navbar-inner">
    <a href="{{ '/' | relative_url }}" class="navbar-brand">
      <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="{{ site.title }}" width="36" height="36">
      <span>SBN Ambiental</span>
    </a>

    <nav class="navbar-links" aria-label="Navegación principal">
      {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active" aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>

    <div class="navbar-actions">
      <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false" aria-label="Cambiar entre modo claro y oscuro">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"></path></svg>
      </button>
      <a href="{{ '/contacto/' | relative_url }}" class="btn btn-primary btn-sm" style="display:none;" data-nav-cta>Solicitar asesoría</a>
      <button type="button" class="menu-toggle" data-menu-toggle aria-label="Abrir menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
    </div>
  </div>
</header>

<div class="mobile-menu-backdrop" data-mobile-backdrop></div>
<nav class="mobile-menu" data-mobile-menu aria-label="Navegación móvil">
  <div class="mobile-menu-header">
    <button type="button" class="menu-toggle" data-menu-close aria-label="Cerrar menú">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  {% for item in site.data.navigation.main %}
    <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
  {% endfor %}
  <a href="{{ '/contacto/' | relative_url }}" class="btn btn-primary btn-block" style="margin-top:1.5rem;">Solicitar asesoría</a>
</nav>
