layout: default
---
<section class="page-hero" data-animate>
  <div class="container">
    {% include breadcrumbs.html current=page.title %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p>{{ page.description }}</p>{% endif %}
  </div>
</section>

<section class="section">
  <div class="container" style="max-width: 860px;">
    {{ content }}
  </div>
</section>
